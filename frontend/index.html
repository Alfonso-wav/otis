<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pokedex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="splash-screen">
    <div class="splash-zzz">
      <span>z</span>
      <span>z</span>
      <span>Z</span>
    </div>
    <img class="splash-snorlax" src="/src/assets/snorlax-splash.svg" alt="Snorlax" />
    <p class="splash-text" data-i18n="splash.text">Snorlax est&aacute; despertando...</p>
  </div>

  <header class="pokedex-header">
    <div class="header-brand px-4 py-3 d-flex align-items-center gap-3">
      <h1 class="mb-0">Pokédex</h1>
      <div class="ms-auto d-flex gap-2" id="search-bar">
        <input id="search-input" type="text" class="form-control" placeholder="Buscar por nombre o número..." data-i18n-placeholder="common.searchPlaceholder" />
        <button id="search-btn" class="btn btn-light" data-i18n="common.search">Buscar</button>
      </div>
    </div>
    <nav class="tab-nav px-4" id="tab-nav">
      <button class="tab-btn active" data-tab="pokedex" data-i18n="tabs.pokedex">Pokédex</button>
      <button class="tab-btn" data-tab="explore" data-i18n="tabs.explore">Explorar</button>
      <button class="tab-btn" data-tab="builds" data-i18n="tabs.builds">Builds</button>
      <button class="tab-btn" data-tab="settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
        </svg>
      </button>
    </nav>
  </header>

  <main class="container-fluid p-4">
    <div id="tab-pokedex" class="tab-page">
      <section id="list-view">
        <div id="filter-bar" class="filter-bar">
          <div class="filter-dropdown" id="dropdown-gen">
            <button class="filter-dropdown__trigger" type="button" data-i18n="filters.generation">Generación</button>
            <div class="filter-dropdown__panel" id="filter-gen"></div>
          </div>
          <div class="filter-dropdown" id="dropdown-type">
            <button class="filter-dropdown__trigger" type="button" data-i18n="filters.type">Tipo</button>
            <div class="filter-dropdown__panel" id="filter-type"></div>
          </div>
          <button id="filter-legendary" class="filter-pill" data-i18n="filters.legendary">⭐ Legendario</button>
          <button id="filter-mythical" class="filter-pill" data-i18n="filters.mythical">✨ Mítico</button>
          <button id="filter-reset" class="filter-reset-btn" data-i18n="filters.resetAll">✕ Todos</button>
          <button id="view-toggle-btn" class="filter-pill" data-i18n="filters.tableView">⊞ Tabla</button>
        </div>
        <div id="row-limit-control" class="row-limit-control hidden">
          <label class="row-limit-control__label" data-i18n="pokedex.rowLimit">Límite de filas</label>
          <button id="limit-decrease" class="btn btn-primary" disabled>−50</button>
          <span id="limit-display" class="row-limit-control__display">50</span>
          <button id="limit-increase" class="btn btn-primary">+50</button>
          <span class="row-limit-control__separator"></span>
          <button id="page-prev" class="btn btn-primary" disabled>←</button>
          <span id="page-indicator" class="row-limit-control__display">Pág. 1 / 1</span>
          <button id="page-next" class="btn btn-primary" disabled>→</button>
        </div>
        <div id="pokemon-grid"></div>
        <div id="scroll-sentinel" class="scroll-sentinel">
          <span class="scroll-sentinel__text" data-i18n="common.loading">Cargando...</span>
        </div>
      </section>

      <section id="detail-view" class="hidden">
        <button id="back-btn" class="btn mb-3">&larr; <span data-i18n="common.back">Volver</span></button>
        <div id="pokemon-detail" class="card p-4 shadow-sm text-center"></div>
      </section>
    </div>

    <div id="tab-builds" class="tab-page hidden"></div>

    <div id="tab-explore" class="tab-page hidden">
      <div class="coming-soon">
        <div class="coming-soon__icon">🗺️</div>
        <h2 data-i18n="explore.title">Explorar</h2>
        <p data-i18n="explore.comingSoon">Próximamente — regiones, movimientos y datos detallados</p>
      </div>
    </div>

    <div id="tab-settings" class="tab-page hidden">
      <div class="settings-page">
        <h2 class="settings-title" data-i18n="settings.title">Settings</h2>
        <div class="settings-row">
          <span class="settings-label" data-i18n="settings.darkMode">Dark Mode</span>
          <label class="toggle-switch">
            <input type="checkbox" id="dark-mode-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <span class="settings-label" data-i18n="settings.language">Idioma</span>
          <select id="language-select" class="form-select form-select-sm" style="width: auto;">
            <option value="es">Espa&#241;ol</option>
            <option value="en">English</option>
          </select>
        </div>
        <button id="settings-apply-btn" class="settings-apply-btn" disabled data-i18n="settings.apply">Aplicar</button>
      </div>
    </div>
  </main>

  <script src="/wails/ipc.js"></script>
  <script src="/wails/runtime.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
