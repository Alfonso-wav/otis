<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="pokedex-header">
    <div class="header-brand px-4 py-3 d-flex align-items-center gap-3">
      <h1 class="mb-0">Pokédex</h1>
      <div class="ms-auto d-flex gap-2" id="search-bar">
        <input id="search-input" type="text" class="form-control" placeholder="Buscar por nombre o número..." />
        <button id="search-btn" class="btn btn-light">Buscar</button>
      </div>
    </div>
    <nav class="tab-nav px-4" id="tab-nav">
      <button class="tab-btn active" data-tab="pokedex">Pokédex</button>
      <button class="tab-btn" data-tab="types">Por Tipo</button>
      <button class="tab-btn" data-tab="explore">Explorar</button>
      <button class="tab-btn" data-tab="compare">Comparar</button>
    </nav>
  </header>

  <main class="container-fluid p-4">
    <div id="tab-pokedex" class="tab-page">
      <section id="list-view">
        <div id="filter-bar" class="filter-bar">
          <select id="filter-gen" class="filter-select">
            <option value="">Todas las generaciones</option>
          </select>
          <select id="filter-type" class="filter-select">
            <option value="">Todos los tipos</option>
          </select>
          <button id="filter-legendary" class="filter-pill" title="Mostrar solo legendarios">⭐ Legendario</button>
          <button id="filter-mythical" class="filter-pill" title="Mostrar solo míticos">✨ Mítico</button>
          <button id="filter-reset" class="filter-reset-btn">✕ Todos</button>
        </div>
        <div id="pokemon-grid"></div>
        <div id="pagination" class="d-flex align-items-center justify-content-center gap-3 mt-4">
          <button id="prev-btn" class="btn btn-primary" disabled>&larr; Anterior</button>
          <span id="page-info"></span>
          <button id="next-btn" class="btn btn-primary">Siguiente &rarr;</button>
        </div>
      </section>

      <section id="detail-view" class="hidden">
        <button id="back-btn" class="btn mb-3">&larr; Volver</button>
        <div id="pokemon-detail" class="card p-4 shadow-sm text-center"></div>
      </section>
    </div>

    <div id="tab-types" class="tab-page hidden">
      <div class="coming-soon">
        <div class="coming-soon__icon">🌿</div>
        <h2>Por Tipo</h2>
        <p>Próximamente — vista de Pokémon agrupados por tipo</p>
      </div>
    </div>

    <div id="tab-compare" class="tab-page hidden"></div>

    <div id="tab-explore" class="tab-page hidden">
      <div class="coming-soon">
        <div class="coming-soon__icon">🗺️</div>
        <h2>Explorar</h2>
        <p>Próximamente — regiones, movimientos y datos detallados</p>
      </div>
    </div>
  </main>

  <script src="/wails/ipc.js"></script>
  <script src="/wails/runtime.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
